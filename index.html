  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"82b3f08c-9843-4712-9806-db54f3a74c10\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *{box-sizing:border-box}\n    html,body{margin:0;height:100%;background:#efe7d3;overscroll-behavior:none}\n    body{position:fixed;inset:0;overflow:hidden}\n    @keyframes floatBlob {\n      0%,100%{ transform: translate(0px,0px) scale(1); }\n      50%{ transform: translate(var(--dx,0px), var(--dy,0px)) scale(var(--ds,1)); }\n    }\n    input::placeholder{ color:rgba(20,18,16,0.30); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:fixed;inset:0;overflow:hidden;font-family:'DM Mono',ui-monospace,monospace\">\n  <div style=\"display:contents\">\n    <div ref=\"{{ screenRef }}\" onpointerdown=\"{{ onDown }}\" onpointermove=\"{{ onMove }}\" onpointerup=\"{{ onUp }}\" onpointercancel=\"{{ onUp }}\" style=\"position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;overflow:hidden;background:linear-gradient(180deg,#f3ecda 0%,#efe7d3 55%,#ece2cf 100%);font-family:'DM Mono',ui-monospace,monospace;touch-action:none;user-select:none;-webkit-user-select:none\">\n\n      <div style=\"{{ trackStyle }}\">\n\n        <!-- PANEL 0 — CALENDAR -->\n        <div style=\"flex:0 0 33.3333%;position:relative;height:100%;overflow:hidden\">\n         <div style=\"{{ p0Style }}\">\n          <div style=\"position:absolute;top:calc(50px + env(safe-area-inset-top));left:0;right:0;display:flex;align-items:center;justify-content:center;gap:16px;z-index:3\">\n            <div onclick=\"{{ onPrevMonth }}\" style=\"cursor:pointer;padding:4px 10px;color:#6a6256;font-size:18px;line-height:1\">‹<\u002Fdiv>\n            <div style=\"font-size:13px;letter-spacing:2.5px;color:#3a352d;min-width:140px;text-align:center\">{{ monthLabel }}<\u002Fdiv>\n            <div onclick=\"{{ onNextMonth }}\" style=\"cursor:pointer;padding:4px 10px;color:#6a6256;font-size:18px;line-height:1\">›<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;top:calc(92px + env(safe-area-inset-top));left:16px;right:16px;z-index:3\">\n            <div style=\"display:flex;padding-bottom:10px\">\n              <div style=\"flex:1;text-align:center;font-size:10px;letter-spacing:1px;color:#a59c8c\">S<\u002Fdiv>\n              <div style=\"flex:1;text-align:center;font-size:10px;letter-spacing:1px;color:#a59c8c\">M<\u002Fdiv>\n              <div style=\"flex:1;text-align:center;font-size:10px;letter-spacing:1px;color:#a59c8c\">T<\u002Fdiv>\n              <div style=\"flex:1;text-align:center;font-size:10px;letter-spacing:1px;color:#a59c8c\">W<\u002Fdiv>\n              <div style=\"flex:1;text-align:center;font-size:10px;letter-spacing:1px;color:#a59c8c\">T<\u002Fdiv>\n              <div style=\"flex:1;text-align:center;font-size:10px;letter-spacing:1px;color:#a59c8c\">F<\u002Fdiv>\n              <div style=\"flex:1;text-align:center;font-size:10px;letter-spacing:1px;color:#a59c8c\">S<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ calWeeks }}\" as=\"week\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex\">\n                <sc-for list=\"{{ week }}\" as=\"cell\" hint-placeholder-count=\"7\">\n                  <div onclick=\"{{ onPickDate }}\" data-date=\"{{ cell.dateStr }}\" style=\"{{ cell.cellStyle }}\">\n                    <sc-if value=\"{{ cell.hasTodos }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ cell.blobStyle }}\"><\u002Fdiv><\u002Fsc-if>\n                    <span style=\"{{ cell.numStyle }}\">{{ cell.day }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n         <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- PANEL 1 — TODAY -->\n        <div style=\"flex:0 0 33.3333%;position:relative;height:100%;overflow:hidden\">\n         <div style=\"{{ p1Style }}\">\n          <sc-for list=\"{{ todayBlobs }}\" as=\"b\" hint-placeholder-count=\"5\">\n            <div style=\"{{ b.wrapStyle }}\" data-id=\"{{ b.id }}\" onclick=\"{{ onBlobClick }}\">\n              <div style=\"{{ b.glowStyle }}\"><\u002Fdiv>\n              <div style=\"{{ b.labelStyle }}\">{{ b.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ todayEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:1px;color:#b3a994;pointer-events:none\">tap + to add a context<\u002Fdiv>\n          <\u002Fsc-if>\n         <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- PANEL 2 — COMPLETED -->\n        <div style=\"flex:0 0 33.3333%;position:relative;height:100%;overflow:hidden\">\n         <div style=\"{{ p2Style }}\">\n          <sc-for list=\"{{ completedBlobs }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <div style=\"{{ b.wrapStyle }}\" data-id=\"{{ b.id }}\" onclick=\"{{ onBlobClick }}\">\n              <div style=\"{{ b.glowStyle }}\"><\u002Fdiv>\n              <div style=\"{{ b.labelStyle }}\">{{ b.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ completedEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:1px;color:#b3a994;pointer-events:none\">nothing completed yet<\u002Fdiv>\n          <\u002Fsc-if>\n         <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- pager dots -->\n      <sc-if value=\"{{ pagerChrome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:absolute;top:calc(20px + env(safe-area-inset-top));left:0;right:0;display:flex;gap:7px;justify-content:center;z-index:24;pointer-events:none\">\n          <sc-for list=\"{{ dotsList }}\" as=\"d\" hint-placeholder-count=\"3\"><div style=\"{{ d.style }}\"><\u002Fdiv><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DAY DETAIL -->\n      <sc-if value=\"{{ dayDate }}\" hint-placeholder-val=\"{{ false }}\">\n        <div ref=\"{{ dayRef }}\" style=\"position:absolute;inset:0;z-index:20;overflow:hidden;background:linear-gradient(180deg,#f3ecda 0%,#efe7d3 55%,#ece2cf 100%);transform:translateX(100%)\">\n          <div onclick=\"{{ closeDay }}\" style=\"position:absolute;top:calc(46px + env(safe-area-inset-top));left:18px;z-index:5;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#3a352d;font-size:22px;line-height:1\">‹<\u002Fdiv>\n          <div style=\"position:absolute;top:calc(52px + env(safe-area-inset-top));left:0;right:0;text-align:center;z-index:3;font-size:13px;letter-spacing:2.5px;color:#3a352d;pointer-events:none\">{{ dayTitle }}<\u002Fdiv>\n          <sc-for list=\"{{ dayBlobs }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <div style=\"{{ b.wrapStyle }}\" data-id=\"{{ b.id }}\" onclick=\"{{ onBlobClick }}\">\n              <div style=\"{{ b.glowStyle }}\"><\u002Fdiv>\n              <div style=\"{{ b.labelStyle }}\">{{ b.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ dayEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:1px;color:#b3a994;pointer-events:none\">tap + to add for this day<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- plus -->\n      <sc-if value=\"{{ showPlus }}\" hint-placeholder-val=\"{{ true }}\">\n        <button aria-label=\"New context\" onclick=\"{{ onPlus }}\" style=\"position:absolute;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:24;width:58px;height:58px;border-radius:50%;border:none;background:#141210;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(0,0,0,0.30),0 1px 3px rgba(0,0,0,0.3);padding:0\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><path d=\"M11 3v16M3 11h16\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n\n      <!-- compose -->\n      <sc-if value=\"{{ composing }}\" hint-placeholder-val=\"{{ false }}\">\n        <div ref=\"{{ overlayRef }}\" onpointerdown=\"{{ onComposeDown }}\" onpointermove=\"{{ onComposeMove }}\" style=\"position:absolute;z-index:40;overflow:hidden;display:flex;align-items:center;justify-content:center;transform-origin:center center;box-shadow:0 10px 40px rgba(0,0,0,0.10);will-change:top,left,width,height,filter,opacity;touch-action:none\">\n          <input ref=\"{{ inputRef }}\" onkeydown=\"{{ onComposeKey }}\" autocomplete=\"off\" autocapitalize=\"characters\" spellcheck=\"false\" placeholder=\"type a context\" style=\"position:relative;z-index:2;width:80%;border:none;outline:none;background:transparent;text-align:center;text-transform:uppercase;color:#141210;font-family:'DM Mono',ui-monospace,monospace;font-weight:500;letter-spacing:2px;line-height:1.3;caret-color:#141210;user-select:text\">\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 458, &quot;height&quot;: 930 },\n  &quot;floatIntensity&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;min&quot;: 0, &quot;max&quot;: 10, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;softness&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 15, &quot;min&quot;: 6, &quot;max&quot;: 28, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;labelCase&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;UPPER&quot;, &quot;options&quot;: [&quot;UPPER&quot;, &quot;As typed&quot;], &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  KEY = 'blobTodos.v1';\n  EASE = 'cubic-bezier(.5,.05,.25,1)';\n  PALETTE = ['#e15a37','#e6a23a','#5982c2','#3fa28f','#9079c2','#d76f92'];\n  MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];\n\n  screenRef = React.createRef();\n  overlayRef = React.createRef();\n  inputRef = React.createRef();\n  dayRef = React.createRef();\n\n  state = {\n    todos: this.loadTodos(),\n    composing: null, editingId: null,\n    page: 1, dragX: 0, dragging: false,\n    dayDate: null,\n    calMonth: this.thisMonth(),\n  };\n\n  // ---------- dates ----------\n  pad(n) { return String(n).padStart(2,'0'); }\n  todayStr() { const d = new Date(); return `${d.getFullYear()}-${this.pad(d.getMonth()+1)}-${this.pad(d.getDate())}`; }\n  thisMonth() { const d = new Date(); return { y:d.getFullYear(), m:d.getMonth() }; }\n\n  // ---------- data ----------\n  uid() { return 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }\n\n  mkFloat() {\n    const m = 12;\n    return {\n      fx: Math.round((Math.random()*2-1)*m),\n      fy: Math.round((Math.random()*2-1)*m),\n      fdur: Math.round((14+Math.random()*8)*10)/10,\n      fdelay: Math.round(-(Math.random()*10)*10)/10,\n      fds: Math.round((1+Math.random()*0.03)*1000)/1000,\n    };\n  }\n\n  seed() {\n    const today = this.todayStr();\n    const mk = (label,x,y,size,color) => ({ id:this.uid(), label, x, y, size, color, done:false, date:today, entering:false, ...this.mkFloat() });\n    return [\n      mk('POI',             200, 200, 188, '#e15a37'),\n      mk('IMPROVING WRITING',130, 312, 204, '#e6a23a'),\n      mk('JOURNALING',      220, 392, 176, '#e0b14f'),\n      mk('MUSINGS',         272, 470, 162, '#5982c2'),\n      mk('HOME',            150, 592, 178, '#8f86c6'),\n    ];\n  }\n\n  loadTodos() {\n    try {\n      const raw = localStorage.getItem(this.KEY);\n      if (raw) {\n        const a = JSON.parse(raw);\n        if (Array.isArray(a) && a.length) {\n          const today = this.todayStr();\n          return a.map(t => ({ ...t, date: t.date || today, done: !!t.done, entering:false }));\n        }\n      }\n    } catch (e) {}\n    return this.seed();\n  }\n\n  save() {\n    try {\n      const data = this.state.todos.map(t => ({ id:t.id,label:t.label,color:t.color,x:t.x,y:t.y,size:t.size,done:t.done,date:t.date,fx:t.fx,fy:t.fy,fdur:t.fdur,fdelay:t.fdelay,fds:t.fds }));\n      localStorage.setItem(this.KEY, JSON.stringify(data));\n    } catch (e) {}\n  }\n\n  // ---------- geometry ----------\n  screenSize() {\n    const el = this.screenRef.current;\n    if (el) { const r = el.getBoundingClientRect(); if (r.width > 0) return { w:r.width, h:r.height }; }\n    return { w:402, h:874 };\n  }\n\n  randomSlot(size, date) {\n    const { w, h } = this.screenSize();\n    const minX = size/2+16, maxX = w-size/2-16, minY = 130, maxY = h-170;\n    const centers = this.state.todos.filter(t => t.date===date && !t.done).map(t => ({ x:t.x, y:t.y }));\n    let best = null, bestD = -1;\n    for (let i=0;i<40;i++) {\n      const x = minX + Math.random()*(maxX-minX);\n      const y = minY + Math.random()*(maxY-minY);\n      let d = 1e9;\n      for (const c of centers) { const dd = Math.hypot(x-c.x,y-c.y); if (dd<d) d=dd; }\n      if (centers.length===0) { best = {x,y}; break; }\n      if (d>bestD) { bestD=d; best={x,y}; }\n    }\n    return best || { x:w/2, y:h/2 };\n  }\n\n  rectOf(t) { return { left:t.x-t.size/2, top:t.y-t.size/2, w:t.size, h:t.size }; }\n  fontFor(size) { return Math.max(12, Math.round(size*0.085)); }\n\n  // ---------- compose morph (visual = WAAPI, state = setTimeout) ----------\n  geomKeys(s) {\n    return { left:s.left+'px', top:s.top+'px', width:s.w+'px', height:s.h+'px', borderRadius:s.r, filter:'blur('+s.blur+'px)' };\n  }\n  applyGeom(ov, s) { Object.assign(ov.style, this.geomKeys(s)); }\n\n  animateOv(from, to, dur) {\n    const ov = this.overlayRef.current; if (!ov) return;\n    if (this._anim) { try { this._anim.cancel(); } catch (e) {} }\n    this.applyGeom(ov, to);\n    this._anim = ov.animate([this.geomKeys(from), this.geomKeys(to)], { duration:dur, easing:this.EASE });\n  }\n  fadeOv(o0, o1, dur) {\n    const ov = this.overlayRef.current; if (!ov) return;\n    ov.style.opacity = String(o1);\n    ov.animate([{ opacity:String(o0) }, { opacity:String(o1) }], { duration:dur, easing:this.EASE });\n  }\n  animateInput(f0, o0, f1, o1, dur) {\n    const inp = this.inputRef.current; if (!inp) return;\n    if (this._inAnim) { try { this._inAnim.cancel(); } catch (e) {} }\n    inp.style.fontSize = f1; inp.style.opacity = String(o1);\n    this._inAnim = inp.animate([{ fontSize:f0, opacity:String(o0) }, { fontSize:f1, opacity:String(o1) }], { duration:dur, easing:this.EASE });\n  }\n\n  startOpen(mode) {\n    const ov = this.overlayRef.current, inp = this.inputRef.current;\n    if (!ov || !inp) return;\n    const { w, h } = this.screenSize();\n    const c = this.state.composing.color;\n    ov.style.background = 'radial-gradient(120% 95% at 50% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0) 55%), ' + c;\n    ov.style.opacity = '1';\n\n    let from, f0, o0;\n    if (mode === 'new') {\n      inp.value = '';\n      from = { left:w/2-32, top:h-55-32, w:64, h:64, r:'50%', blur:6 };\n      f0 = '14px'; o0 = 0;\n    } else {\n      const t = this._pending.todo;\n      inp.value = t.label;\n      const R = this.rectOf(t);\n      from = { left:R.left, top:R.top, w:R.w, h:R.h, r:'50%', blur:14 };\n      f0 = this.fontFor(t.size)+'px'; o0 = 1;\n    }\n    const to = { left:0, top:0, w, h, r:'0px', blur:0 };\n    this.applyGeom(ov, from);\n    this.animateOv(from, to, 560);\n    this.animateInput(f0, o0, '30px', 1, 560);\n    setTimeout(() => { try { inp.focus(); } catch (e) {} }, 90);\n  }\n\n  commit() {\n    const inp = this.inputRef.current;\n    const text = (inp ? inp.value : '').trim();\n    if (!text) { this.cancelCompose(); return; }\n    const { mode, todo } = this._pending;\n    todo.label = text;\n    const { w, h } = this.screenSize();\n    const R = this.rectOf(todo);\n    const from = { left:0, top:0, w, h, r:'0px', blur:0 };\n    const to = { left:R.left, top:R.top, w:R.w, h:R.h, r:'50%', blur:15 };\n\n    if (mode === 'new') this.setState(s => ({ todos: [...s.todos, { ...todo, entering:true }] }));\n    this.animateInput('30px', 1, this.fontFor(todo.size)+'px', 0, 480);\n    this.animateOv(from, to, 540);\n\n    clearTimeout(this._t1); clearTimeout(this._t2);\n    this._t1 = setTimeout(() => {\n      this.setState(s => {\n        let todos = s.todos;\n        if (mode === 'new') todos = todos.map(t => t.id===todo.id ? { ...t, entering:false } : t);\n        else todos = todos.map(t => t.id===todo.id ? { ...t, label:text } : t);\n        return { todos, editingId:null };\n      }, () => this.save());\n      this.fadeOv(1, 0, 240);\n    }, 430);\n    this._t2 = setTimeout(() => this.setState({ composing:null, editingId:null }), 690);\n  }\n\n  cancelCompose() {\n    const { w, h } = this.screenSize();\n    const from = { left:0, top:0, w, h, r:'0px', blur:0 };\n    const to = { left:w/2-32, top:h-55-32, w:64, h:64, r:'50%', blur:8 };\n    this.animateInput('30px', 1, '14px', 0, 360);\n    this.fadeOv(1, 0, 380);\n    this.animateOv(from, to, 380);\n    clearTimeout(this._t1); clearTimeout(this._t2);\n    this._t2 = setTimeout(() => this.setState({ composing:null, editingId:null }), 410);\n  }\n\n  // ---------- interactions ----------\n  onPlus = () => {\n    if (this.state.composing) return;\n    const date = this.state.dayDate || this.todayStr();\n    const size = Math.round(155 + Math.random()*48);\n    const c = this.PALETTE[Math.floor(Math.random()*this.PALETTE.length)];\n    const slot = this.randomSlot(size, date);\n    const todo = { id:this.uid(), label:'', color:c, x:slot.x, y:slot.y, size, done:false, date, ...this.mkFloat() };\n    this._pending = { mode:'new', todo };\n    this.setState({ composing:{ color:c }, editingId:null }, () => this.startOpen('new'));\n  };\n\n  openEdit(id) {\n    if (this.state.composing) return;\n    const t = this.state.todos.find(x => x.id===id);\n    if (!t) return;\n    this._pending = { mode:'edit', todo:{ ...t } };\n    this.setState({ composing:{ color:t.color }, editingId:id }, () => this.startOpen('edit'));\n  }\n\n  // double-tap: fade the blob out, then flip done (it relocates to / from Completed)\n  toggleDone(id) {\n    const root = this.screenRef.current;\n    const nodes = root ? [...root.querySelectorAll('[data-id=\"'+id+'\"]')] : [];\n    nodes.forEach(n => { try { n.animate([{ opacity:1, transform:'scale(1)' },{ opacity:0, transform:'scale(0.62)' }], { duration:300, easing:'cubic-bezier(.4,0,1,1)', fill:'forwards' }); } catch (e) {} });\n    clearTimeout(this._doneT);\n    this._doneT = setTimeout(() => {\n      this.setState(s => ({ todos: s.todos.map(t => t.id===id ? { ...t, done:!t.done } : t) }), () => this.save());\n    }, 280);\n  }\n\n  onBlobClick = (e) => {\n    if (this._swiped || this.state.composing) return;\n    const id = e.currentTarget.dataset.id;\n    if (this._tapTimer && this._tapId === id) {\n      clearTimeout(this._tapTimer); this._tapTimer = null;\n      this.toggleDone(id);\n    } else {\n      this._tapId = id;\n      clearTimeout(this._tapTimer);\n      this._tapTimer = setTimeout(() => { this._tapTimer = null; this.openEdit(id); }, 250);\n    }\n  };\n\n  onComposeKey = (e) => {\n    if (e.key === 'Enter') { e.preventDefault(); this.commit(); }\n    else if (e.key === 'Escape') { e.preventDefault(); this.cancelCompose(); }\n  };\n\n  // swipe DOWN on the compose dialog = same as hitting enter\n  onComposeDown = (e) => { this._cdy = e.clientY; this._cdx = e.clientX; this._cFired = false; };\n  onComposeMove = (e) => {\n    if (this._cdy == null || this._cFired) return;\n    const dy = e.clientY - this._cdy, dx = e.clientX - this._cdx;\n    if (dy > 60 && dy > Math.abs(dx)) { this._cFired = true; this._cdy = null; this.commit(); }\n  };\n\n  // ---------- calendar / day ----------\n  onPrevMonth = () => { if (this._swiped) return; this.setState(s => { let { y, m } = s.calMonth; m--; if (m<0) { m=11; y--; } return { calMonth:{ y, m } }; }); };\n  onNextMonth = () => { if (this._swiped) return; this.setState(s => { let { y, m } = s.calMonth; m++; if (m>11) { m=0; y++; } return { calMonth:{ y, m } }; }); };\n\n  onPickDate = (e) => {\n    if (this._swiped) return;\n    const ds = e.currentTarget.dataset.date;\n    if (!ds) return;\n    this.openDay(ds);\n  };\n\n  openDay(ds) {\n    this.setState({ dayDate: ds }, () => {\n      const el = this.dayRef.current;\n      if (el) { el.style.transform = 'translateX(0px)'; el.animate([{ transform:'translateX(100%)' },{ transform:'translateX(0px)' }], { duration:340, easing:this.EASE }); }\n    });\n  }\n\n  closeDay = () => {\n    if (this._swiped) return;\n    const el = this.dayRef.current;\n    if (el) { el.style.transform = 'translateX(100%)'; el.animate([{ transform:'translateX(0px)' },{ transform:'translateX(100%)' }], { duration:300, easing:this.EASE }); }\n    clearTimeout(this._dayT);\n    this._dayT = setTimeout(() => this.setState({ dayDate:null, page:0 }), 290);\n  };\n\n  // ---------- swipe pager ----------\n  onDown = (e) => {\n    if (this.state.composing) return;\n    this._sx = e.clientX; this._sy = e.clientY; this._axis = null; this._swiped = false; this._captured = false;\n  };\n  onMove = (e) => {\n    if (this.state.composing || this._sx == null) return;\n    const dx = e.clientX - this._sx, dy = e.clientY - this._sy;\n    if (this._axis == null) {\n      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) this._axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';\n      else return;\n    }\n    if (this._axis !== 'x') return;\n    this._swiped = true;\n    if (!this._captured) { try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} this._captured = true; }\n    if (this.state.dayDate) return;\n    let d = dx;\n    const page = this.state.page;\n    if ((page===0 && d>0) || (page===2 && d<0)) d *= 0.35;\n    if (!this.state.dragging) this.setState({ dragging:true });\n    this.setState({ dragX:d });\n    if (e.cancelable) e.preventDefault();\n  };\n  onUp = (e) => {\n    if (this._sx == null) return;\n    const dx = e.clientX - this._sx;\n    this._sx = null;\n    if (this._axis === 'x' && !this.state.dayDate) {\n      const page = this.state.page; let np = page;\n      if (dx < -55 && page < 2) np++; else if (dx > 55 && page > 0) np--;\n      this.setState({ page:np, dragX:0, dragging:false });\n    } else {\n      this.setState({ dragX:0, dragging:false });\n    }\n    setTimeout(() => { this._swiped = false; }, 60);\n  };\n\n  // ---------- render ----------\n  makeBlob(t, k, blur, upper, editingId) {\n    const c = t.color, done = !!t.done, size = t.size, fs = this.fontFor(size);\n    const hidden = !!t.entering || t.id === editingId;\n    return {\n      id: t.id, label: t.label,\n      wrapStyle: {\n        position:'absolute', left:(t.x-size/2)+'px', top:(t.y-size/2)+'px', width:size+'px', height:size+'px',\n        opacity: hidden ? 0 : 1, transition:'opacity .4s ease', cursor:'pointer', zIndex:2, willChange:'transform',\n        animation:`floatBlob ${t.fdur}s ease-in-out ${t.fdelay}s infinite`,\n        '--dx': Math.round(t.fx*k)+'px', '--dy': Math.round(t.fy*k)+'px', '--ds': (1+(t.fds-1)*k),\n      },\n      glowStyle: {\n        position:'absolute', inset:'-16%', borderRadius:'50%',\n        background:`radial-gradient(circle at 50% 43%, ${c} 0%, ${c} 15%, ${c}00 70%)`,\n        filter: done ? `blur(${blur}px) saturate(0.55)` : `blur(${blur}px)`,\n        opacity: done ? 0.62 : 0.92,\n        transition:'filter .45s ease, opacity .45s ease', pointerEvents:'none',\n      },\n      labelStyle: {\n        position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', textAlign:'center', padding:'0 16%',\n        fontFamily:\"'DM Mono', ui-monospace, monospace\", fontSize:fs+'px', fontWeight:500, letterSpacing:'1.5px',\n        textTransform: upper ? 'uppercase' : 'none', color: done ? '#7d766a' : '#1a1714', lineHeight:1.3, pointerEvents:'none',\n      },\n    };\n  }\n\n  renderVals() {\n    const editingId = this.state.editingId;\n    const intensity = this.props.floatIntensity ?? 3;\n    const k = intensity/3;\n    const blur = this.props.softness ?? 15;\n    const upper = (this.props.labelCase ?? 'UPPER') !== 'As typed';\n    const mk = (t) => this.makeBlob(t, k, blur, upper, editingId);\n\n    const today = this.todayStr();\n    const todos = this.state.todos;\n    const dayDate = this.state.dayDate;\n\n    const todayBlobs = todos.filter(t => t.date===today && !t.done).map(mk);\n    const completedBlobs = todos.filter(t => t.done).map(mk);\n    const dayBlobs = dayDate ? todos.filter(t => t.date===dayDate && !t.done).map(mk) : [];\n\n    // calendar grid\n    const { y, m } = this.state.calMonth;\n    const monthLabel = `${this.MONTHS[m]} ${y}`;\n    const byDate = {};\n    todos.forEach(t => { (byDate[t.date] = byDate[t.date] || []).push(t); });\n    const firstDow = new Date(y, m, 1).getDay();\n    const dim = new Date(y, m+1, 0).getDate();\n    const cells = [];\n    for (let i=0;i<firstDow;i++) cells.push({ key:'b'+i, day:'', dateStr:'', hasTodos:false });\n    for (let d=1; d<=dim; d++) {\n      const ds = `${y}-${this.pad(m+1)}-${this.pad(d)}`;\n      const list = byDate[ds] || [];\n      const isToday = ds === today;\n      const tint = list.length ? list[0].color : null;\n      cells.push({\n        key: ds, day: d, dateStr: ds, hasTodos: list.length>0,\n        cellStyle: { flex:1, height:'46px', position:'relative', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' },\n        numStyle: { position:'relative', zIndex:1, fontSize:'14px', color: isToday ? '#141210' : '#6a6256', fontWeight: isToday ? 600 : 400, letterSpacing:'0.5px' },\n        blobStyle: { position:'absolute', left:'12%', right:'12%', top:'10%', bottom:'10%', borderRadius:'50%', background:`radial-gradient(circle, ${tint} 0%, ${tint}00 72%)`, filter:'blur(5px)', opacity:0.8, pointerEvents:'none' },\n      });\n    }\n    while (cells.length % 7 !== 0) cells.push({ key:'e'+cells.length, day:'', dateStr:'', hasTodos:false, cellStyle:{ flex:1, height:'46px' } });\n    const calWeeks = [];\n    for (let i=0;i<cells.length;i+=7) calWeeks.push(cells.slice(i, i+7));\n\n    // day title\n    let dayTitle = '';\n    if (dayDate) {\n      const [yy, mm, dd] = dayDate.split('-').map(Number);\n      const dt = new Date(yy, mm-1, dd);\n      const wk = ['SUN','MON','TUE','WED','THU','FRI','SAT'][dt.getDay()];\n      dayTitle = `${wk} ${dd} ${this.MONTHS[mm-1].slice(0,3)}`;\n    }\n\n    const page = this.state.page;\n    const trackStyle = {\n      position:'absolute', top:0, left:0, height:'100%', width:'300%', display:'flex',\n      transform:`translateX(calc(${(-page*33.3333)}% + ${this.state.dragX}px))`,\n      transition: this.state.dragging ? 'none' : 'transform .42s cubic-bezier(.4,0,.2,1)',\n      willChange:'transform',\n    };\n\n    // per-panel parallax — content sweeps in/out faster than the frame, with a fade,\n    // so the in-progress blobs sweep away while the next set sweeps in.\n    const w = this.screenSize().w;\n    const frac = page - this.state.dragX / w;        // fractional current page\n    const PF = 0.5;                                   // parallax depth\n    const panelStyle = (i) => {\n      const rel = i - frac;                           // 0 = centered\n      const ar = Math.min(1, Math.abs(rel));\n      return {\n        position:'absolute', inset:0,\n        transform:`translateX(${(rel*w*PF).toFixed(1)}px) scale(${(1-ar*0.05).toFixed(3)})`,\n        opacity: Math.max(0, 1 - ar*0.95),\n        transformOrigin:'center center',\n        transition: this.state.dragging ? 'none' : 'transform .5s cubic-bezier(.4,0,.2,1), opacity .45s ease',\n        willChange:'transform,opacity',\n      };\n    };\n    const p0Style = panelStyle(0), p1Style = panelStyle(1), p2Style = panelStyle(2);\n\n    const dotsList = [0,1,2].map(i => ({\n      style: {\n        width: i===page ? '16px' : '6px', height:'6px', borderRadius:'3px',\n        background: i===page ? '#3a352d' : 'rgba(58,53,45,0.26)', transition:'all .3s ease',\n      },\n    }));\n\n    return {\n      todayBlobs, completedBlobs, dayBlobs,\n      todayEmpty: todayBlobs.length===0, completedEmpty: completedBlobs.length===0, dayEmpty: dayBlobs.length===0,\n      calWeeks, monthLabel, dayTitle, dayDate,\n      trackStyle, dotsList, p0Style, p1Style, p2Style,\n      pagerChrome: !this.state.composing && !dayDate,\n      showPlus: !this.state.composing && ((page===1 && !dayDate) || !!dayDate),\n      composing: !!this.state.composing,\n      onBlobClick: this.onBlobClick, onPlus: this.onPlus, onComposeKey: this.onComposeKey,\n      onComposeDown: this.onComposeDown, onComposeMove: this.onComposeMove,\n      onPrevMonth: this.onPrevMonth, onNextMonth: this.onNextMonth, onPickDate: this.onPickDate, closeDay: this.closeDay,\n      onDown: this.onDown, onMove: this.onMove, onUp: this.onUp,\n      screenRef: this.screenRef, overlayRef: this.overlayRef, inputRef: this.inputRef, dayRef: this.dayRef,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
